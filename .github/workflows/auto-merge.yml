name: Auto-merge ProfessorGPT Skills

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

jobs:
  auto-merge:
    name: Approve and auto-merge
    runs-on: ubuntu-latest
    # Only run for PRs from the ProfessorGPT platform account
    if: |
      github.event.pull_request.user.login == 'professor-gpt' &&
      startsWith(github.head_ref, 'skill/')
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Approve PR via REST API
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews \
            -d '{"event":"APPROVE","body":"✅ Auto-approved: submitted by ProfessorGPT platform"}'

      - name: Enable auto-merge via GraphQL
        run: |
          PR_NODE_ID="${{ github.event.pull_request.node_id }}"
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            https://api.github.com/graphql \
            -d "{\"query\":\"mutation { enablePullRequestAutoMerge(input: { pullRequestId: \\\"$PR_NODE_ID\\\", mergeMethod: SQUASH }) { pullRequest { autoMergeRequest { enabledAt } } } }\"}"
