name: Auto-merge ProfessorGPT Skills

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

jobs:
  auto-merge:
    name: Approve and auto-merge
    runs-on: ubuntu-latest
    # Only run for PRs from the ProfessorGPT platform account
    if: |
      github.event.pull_request.user.login == 'professor-gpt' &&
      startsWith(github.head_ref, 'skill/')
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Approve PR
        run: |
          gh pr review ${{ github.event.pull_request.number }} \
            --approve \
            --body "✅ Auto-approved: submitted by ProfessorGPT platform"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge (squash)
        run: gh pr merge ${{ github.event.pull_request.number }} --auto --squash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
