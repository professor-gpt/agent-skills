name: Block Unauthorized PRs

on:
  pull_request:
    types: [opened, reopened]

jobs:
  guard:
    name: Reject unauthorized PR
    runs-on: ubuntu-latest
    # Close any PR not coming from the ProfessorGPT platform account
    if: github.event.pull_request.user.login != 'professor-gpt'
    permissions:
      pull-requests: write

    steps:
      - name: Close unauthorized PR
        run: |
          gh pr close ${{ github.event.pull_request.number }} \
            --comment "❌ This repository only accepts skill submissions from the ProfessorGPT platform. Manual PRs are not allowed." \
            --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
