name: Generate Registry

on:
  push:
    branches: [main]
    paths: ["skills/**"]
  workflow_dispatch:

# When multiple skills are published in quick succession each merge triggers a
# separate run. Without concurrency control, older runs check out an earlier
# commit and fail with "non-fast-forward" when they try to push because main
# has already moved on. cancel-in-progress: true drops stale runs so only the
# latest (most complete) checkout wins.
concurrency:
  group: registry
  cancel-in-progress: true

jobs:
  generate:
    name: Regenerate registry.json
    runs-on: ubuntu-latest
    # Skip commits made by this workflow itself (avoids infinite loop)
    if: "!contains(github.event.head_commit.message, '[ci skip]')"
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.REGISTRY_PAT }}
          # fetch-depth: 0 so git pull --rebase can fast-forward to latest main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate registry.json
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node .github/scripts/generate-registry.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add registry.json
          if git diff --staged --quiet; then
            echo "registry.json unchanged — nothing to commit."
            exit 0
          fi
          git commit -m "chore: regenerate registry.json [ci skip]"
          # Rebase onto latest main before pushing — handles the case where
          # another merge landed between our checkout and now.
          git pull --rebase origin main
          git push
