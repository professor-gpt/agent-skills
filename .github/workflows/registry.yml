name: Generate Registry

on:
  push:
    branches: [main]
    paths: ["skills/**"]
  workflow_dispatch:

jobs:
  generate:
    name: Regenerate registry.json
    runs-on: ubuntu-latest
    # Skip commits made by this workflow itself (avoids infinite loop)
    if: "!contains(github.event.head_commit.message, '[ci skip]')"
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # PAT from repo owner (professor-gpt) bypasses Ruleset "require PR" rule.
          # Add REGISTRY_PAT secret: Settings → Secrets → Actions → New repository secret
          # Value: same PAT used for GITHUB_TOKEN in .env (needs repo + workflow scopes)
          token: ${{ secrets.REGISTRY_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate registry.json
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node .github/scripts/generate-registry.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add registry.json
          if git diff --staged --quiet; then
            echo "registry.json unchanged — nothing to commit."
          else
            git commit -m "chore: regenerate registry.json [ci skip]"
            git push
          fi
